<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 220px;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px 16px;
      text-align: center;
    }

    img {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    p {
      font-size: 11px;
      color: rgb(113, 118, 123);
      margin-bottom: 18px;
      line-height: 1.4;
    }

    a {
      display: block;
      background: #FFDD00;
      color: #000;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 9999px;
      transition: opacity 0.15s ease;
    }

    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <img src="128x128.png" alt="Yoink" />
  <h1>Yoink</h1>
  <p>Download videos &amp; images from X with one click.</p>
  <a href="https://buymeacoffee.com/ghostbyte" target="_blank">
    ☕ Buy Me a Coffee
  </a>
</body>
</html>
